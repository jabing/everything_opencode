<h2 id="%E4%BB%80%E4%B9%88%E6%98%AF-nodejs">什么是 Node.js？</h2>
<p>Node.js 是一个基于 Chrome V8 引擎的 JavaScript 运行时，用于构建快速、可扩展的网络应用。</p>

</code></pre>
</li>
<li>

</ul>
</li>
<li>

</ul>

<h3 id="ubuntudebian">Ubuntu/Debian</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl -fsSL https://deb.nodesource.com/setup_lts.x | <span class="hljs-built_in">sudo</span> -E bash -

</code></pre>

</code></pre>

</ul>

<ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%93%A6-%E5%AE%89%E8%A3%85-easy-opencode"><img class="emoji" draggable="false" alt="📦" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f4e6.svg" data-marp-twemoji=""/> 安装 Easy-OpenCode</h2>
<h3 id="%E6%96%B9%E5%BC%8F%E4%B8%80%E5%85%A8%E5%B1%80%E5%AE%89%E8%A3%85%E6%8E%A8%E8%8D%90%E2%AD%90">方式一：全局安装（推荐）<img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b50.svg" data-marp-twemoji=""/></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 全局安装 EOC</span>
npm install -g easy-opencode

<span class="hljs-comment"># 验证安装</span>
eoc-install --version
</code></pre>
<h3 id="%E6%96%B9%E5%BC%8F%E4%BA%8C%E4%BD%BF%E7%94%A8-npx%E6%97%A0%E9%9C%80%E5%85%A8%E5%B1%80%E5%AE%89%E8%A3%85">方式二：使用 npx（无需全局安装）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 直接使用 npx 运行</span>
npx easy-opencode install
</code></pre>
<h3 id="%E5%9C%A8%E9%A1%B9%E7%9B%AE%E4%B8%AD%E5%AE%89%E8%A3%85-easy-opencode">在项目中安装 Easy-OpenCode</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 进入你的项目目录</span>
<span class="hljs-built_in">cd</span> your-project

<span class="hljs-comment"># 运行 EOC 安装程序</span>
eoc-install

<span class="hljs-comment"># 或使用 npx</span>
npx easy-opencode install
</code></pre>
<p>安装选项：</p>
<ol>
<li><strong>Project-level</strong> - 安装到当前项目 <code>.opencode/</code>（推荐）</li>
<li><strong>Global</strong> - 安装到 OpenCode 全局配置目录</li>
</ol>
<p><strong>推荐选择：Project-level</strong>（便于项目管理）</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%E2%9C%85-%E5%AE%89%E8%A3%85%E9%AA%8C%E8%AF%81"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 安装验证</h2>
<p>安装完成后，重启 OpenCode 并验证：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">opencode
</code></pre>
<p>在 OpenCode 中执行：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>/agents
</code></pre>
<p>你应该看到 <strong>13 个 Agent</strong>（3个可见 + 10个隐藏）</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>/help
</code></pre>
<p>你应该看到所有可用命令</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h1 id="%E7%AC%AC4%E7%AB%A0deepseek-api-key-%E9%85%8D%E7%BD%AE">第4章：DeepSeek API Key 配置</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="17" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%94%91-%E4%BB%80%E4%B9%88%E6%98%AF-deepseek-api-key"><img class="emoji" draggable="false" alt="🔑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f511.svg" data-marp-twemoji=""/> 什么是 DeepSeek API Key？</h2>
<p>DeepSeek 是一个强大的 AI 模型提供商，为 OpenCode 提供智能编码能力。</p>
<ul>
<li><img class="emoji" draggable="false" alt="🧠" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f9e0.svg" data-marp-twemoji=""/> 高性能 AI 模型</li>
<li><img class="emoji" draggable="false" alt="💰" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f4b0.svg" data-marp-twemoji=""/> 性价比高</li>
<li><img class="emoji" draggable="false" alt="🌐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f310.svg" data-marp-twemoji=""/> 中文支持优秀</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="18" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%93%9D-%E8%8E%B7%E5%8F%96-deepseek-api-key"><img class="emoji" draggable="false" alt="📝" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f4dd.svg" data-marp-twemoji=""/> 获取 DeepSeek API Key</h2>
<h3 id="1-%E6%B3%A8%E5%86%8C%E8%B4%A6%E5%8F%B7">1. 注册账号</h3>
<p>访问：<a href="https://platform.deepseek.com/">https://platform.deepseek.com/</a></p>
<ul>
<li>使用邮箱或手机号注册</li>
<li>完成身份验证</li>
</ul>
<h3 id="2-%E5%88%9B%E5%BB%BA-api-key">2. 创建 API Key</h3>
<ul>
<li>进入控制台</li>
<li>选择 &quot;API Keys&quot;</li>
<li>点击 &quot;Create API Key&quot;</li>
<li>复制生成的 Key（仅显示一次！）</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="19" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%94%A7-%E9%85%8D%E7%BD%AE-api-key"><img class="emoji" draggable="false" alt="🔧" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f527.svg" data-marp-twemoji=""/> 配置 API Key</h2>
<h3 id="%E6%96%B9%E6%B3%95%E4%B8%80%E7%8E%AF%E5%A2%83%E5%8F%98%E9%87%8F%E6%8E%A8%E8%8D%90">方法一：环境变量（推荐）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 在 ~/.bashrc 或 ~/.zshrc 中添加</span>
<span class="hljs-built_in">export</span> DEEPSEEK_API_KEY=<span class="hljs-string">&quot;your-api-key-here&quot;</span>

<span class="hljs-comment"># 重新加载配置</span>
<span class="hljs-built_in">source</span> ~/.bashrc  <span class="hljs-comment"># 或 source ~/.zshrc</span>
</code></pre>
<h3 id="%E6%96%B9%E6%B3%95%E4%BA%8C%E9%A1%B9%E7%9B%AE%E7%BA%A7%E9%85%8D%E7%BD%AE">方法二：项目级配置</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 在项目根目录创建 .env 文件</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;DEEPSEEK_API_KEY=your-api-key-here&quot;</span> &gt; .<span class="hljs-built_in">env</span>
</code></pre>
<h3 id="%E6%96%B9%E6%B3%95%E4%B8%89opencode-%E9%85%8D%E7%BD%AE%E6%96%87%E4%BB%B6%E6%8C%81%E4%B9%85%E5%8C%96">方法三：OpenCode 配置文件（持久化）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 编辑 OpenCode 配置文件</span>
<span class="hljs-comment"># 文件位置：~/.config/opencode/opencode.json</span>
</code></pre>
<p>在配置文件中添加：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;$schema&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;https://opencode.ai/config.json&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;env&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;DEEPSEEK_API_KEY&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;your-api-key-here&quot;</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<h3 id="%E6%96%B9%E6%B3%95%E5%9B%9B%E5%91%BD%E4%BB%A4%E8%A1%8C%E9%85%8D%E7%BD%AE%E4%B8%B4%E6%97%B6">方法四：命令行配置（临时）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 启动时通过环境变量传递</span>
DEEPSEEK_API_KEY=<span class="hljs-string">&quot;your-api-key-here&quot;</span> opencode
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="20" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%94%92-%E5%AE%89%E5%85%A8%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9"><img class="emoji" draggable="false" alt="🔒" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f512.svg" data-marp-twemoji=""/> 安全注意事项</h2>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>重要提醒：</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/> <strong>永远不要</strong>将 API Key 提交到 Git</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 将 <code>.env</code> 添加到 <code>.gitignore</code></li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 定期轮换 API Key</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 为不同项目使用不同的 Key</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 添加到 .gitignore</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;.env&quot;</span> &gt;&gt; .gitignore
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="21" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%E2%9C%85-api-key-%E9%AA%8C%E8%AF%81"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> API Key 验证</h2>
<p>测试 API Key 是否配置正确：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">echo</span> <span class="hljs-variable">$DEEPSEEK_API_KEY</span>
</code></pre>
<p>应该显示你的 API Key。</p>
<p>在 OpenCode 中测试：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>/test-connection
</code></pre>
<p>应该显示连接成功的消息。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="22" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h1 id="%E7%AC%AC5%E7%AB%A0%E5%BC%80%E5%A7%8B%E4%BD%BF%E7%94%A8-easy-opencode">第5章：开始使用 Easy-OpenCode</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%8E%AF-%E5%BF%AB%E9%80%9F%E5%BC%80%E5%A7%8B"><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f3af.svg" data-marp-twemoji=""/> 快速开始</h2>
<h3 id="1-%E5%90%AF%E5%8A%A8-opencode">1. 启动 OpenCode</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">opencode
</code></pre>
<h3 id="2-%E5%88%9B%E5%BB%BA%E6%88%96%E6%89%93%E5%BC%80%E9%A1%B9%E7%9B%AE">2. 创建或打开项目</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 创建新项目</span>
<span class="hljs-built_in">mkdir</span> my-project
<span class="hljs-built_in">cd</span> my-project
opencode

<span class="hljs-comment"># 或打开现有项目</span>
<span class="hljs-built_in">cd</span> existing-project
opencode
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%92%AC-easy-opencode-%E5%9F%BA%E7%A1%80%E4%BD%BF%E7%94%A8"><img class="emoji" draggable="false" alt="💬" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f4ac.svg" data-marp-twemoji=""/> Easy-OpenCode 基础使用</h2>
<h3 id="%E6%96%B9%E5%BC%8F%E4%B8%80%E5%AF%B9%E8%AF%9D%E5%BC%8F%E4%BA%A4%E4%BA%92%E9%80%9A%E7%94%A8">方式一：对话式交互（通用）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>帮我创建一个 React 组件，用于显示用户列表
</code></pre>
<h3 id="%E6%96%B9%E5%BC%8F%E4%BA%8C%E4%BD%BF%E7%94%A8-eoc-%E5%91%BD%E4%BB%A4%E6%8E%A8%E8%8D%90">方式二：使用 EOC 命令（推荐）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 规划功能</span>
/plan 帮我创建一个用户管理 API

<span class="hljs-comment"># TDD 开发</span>
/tdd 使用 TDD 方式实现用户认证

<span class="hljs-comment"># 代码审查</span>
/code-review 审查这段代码的性能

<span class="hljs-comment"># 安全审查</span>
/security 检查这段代码的安全性

<span class="hljs-comment"># 修复构建错误</span>
/build-fix 帮我修复 TypeScript 错误
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="25" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%F0%9F%A4%96-easy-opencode-agent-%E4%BB%8B%E7%BB%8D"><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f916.svg" data-marp-twemoji=""/> Easy-OpenCode Agent 介绍</h2>
<h3 id="eoc_planner---%E8%A7%84%E5%88%92%E4%B8%93%E5%AE%B6">eoc_planner - 规划专家</h3>
<p>使用场景：复杂功能规划、架构设计</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">/plan 帮我规划一个电商购物车功能
</code></pre>
<h3 id="eoc_tdd---tdd-%E6%8C%87%E5%AF%BC">eoc_tdd - TDD 指导</h3>
<p>使用场景：测试驱动开发</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">/tdd 帮我用 TDD 方式实现用户认证
</code></pre>
<h3 id="eoc_code_reviewer---%E4%BB%A3%E7%A0%81%E5%AE%A1%E6%9F%A5">eoc_code_reviewer - 代码审查</h3>
<p>使用场景：代码质量检查</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">/code-review 审查这段代码的性能
</code></pre>
<h3 id="eoc_security---%E5%AE%89%E5%85%A8%E5%AE%A1%E6%9F%A5">eoc_security - 安全审查</h3>
<p>使用场景：安全漏洞检测</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">/security 检查这段代码的安全问题
</code></pre>
<h3 id="eoc_architect---%E6%9E%B6%E6%9E%84%E8%AE%BE%E8%AE%A1">eoc_architect - 架构设计</h3>
<p>使用场景：系统设计、性能优化</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">/architect 设计一个高可用的微服务架构

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="40" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%E2%9D%93-%E9%97%AE%E9%A2%981nodejs-%E5%AE%89%E8%A3%85%E5%A4%B1%E8%B4%A5"><img class="emoji" draggable="false" alt="❓" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2753.svg" data-marp-twemoji=""/> 问题1：Node.js 安装失败</h2>
<p><strong>症状：</strong> <code>command not found: node</code></p>
<p><strong>解决方案：</strong></p>
<ol>
<li>检查安装是否成功：重新运行安装程序</li>
<li>检查 PATH 环境变量：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">echo</span> <span class="hljs-variable">$PATH</span>
</code></pre>
</li>
<li>手动添加到 PATH：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">export</span> PATH=<span class="hljs-string">&quot;<span class="hljs-variable">$PATH</span>:/usr/local/bin&quot;</span>
</code></pre>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="41" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">

<p><strong>症状：</strong> <code>npm install -g opencode</code> 失败</p>
<p><strong>解决方案：</strong></p>
<ol>
<li>检查网络连接</li>
<li>使用 sudo（仅 Linux/macOS）：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">sudo</span> npm install -g opencode
</code></pre>
</li>
<li>清除 npm 缓存：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">npm cache clean --force
npm install -g opencode
</code></pre>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-background-color="#fff" data-color="#333" data-theme="gaia" lang="C" data-marpit-pagination="42" style="--paginate:true;--background-color:#fff;--color:#333;--theme:gaia;color:#333;background-color:#fff;background-image:none;" data-marpit-pagination-total="49">
<h2 id="%E2%9D%93-%E9%97%AE%E9%A2%983api-key-%E4%B8%8D%E7%94%9F%E6%95%88"><img class="emoji" draggable="false" alt="❓" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2753.svg" data-marp-twemoji=""/> 问题3：API Key 不生效</h2>
<p><strong>症状：</strong> &quot;API Key not configured&quot; 错误</p>
<p><strong>解决方案：</strong></p>
<ol>
<li>验证环境变量：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">echo</span> <span class="hljs-variable">$DEEPSEEK_API_KEY</span>
</code></pre>
</li>
<li>检查 .env 文件是否在项目根目录</li>
<li>重启 OpenCode：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 退出 OpenCode</span>
<span class="hljs-built_in">exit</span>
<span class="hljs-comment"># 重新启动</span>
opencode
</code></pre>
</li>
</ol>
</section>

<p><strong>症状：</strong> 执行 <code>/agents</code> 看不到所有 Agent</p>
<p><strong>解决方案：</strong></p>

</code></pre>
</li>
<li>重新安装 Easy-OpenCode：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">node scripts/install.js
</code></pre>
</li>
<li>清除缓存并重启：<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">rm</span> -rf ~/.config/opencode/.cache
opencode
</code></pre>
</li>
</ol>
